<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gather & Grace · Events & Rentals</title>
  <!-- Playfair Display & Lato – elegant, celebratory -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Lato:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #faf5f0 0%, #f0e8e0 100%);
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2d241c;
    }

    .events-system {
      max-width: 1400px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 42px;
      box-shadow: 0 30px 50px -15px rgba(60, 40, 30, 0.15),
                  0 8px 20px rgba(0, 0, 0, 0.05),
                  inset 0 0 0 1px rgba(255, 250, 240, 0.8);
      padding: 2.2rem 2.5rem;
      border: 1px solid #e8ddd0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 20px;
      border-bottom: 1px solid #ddd0c0;
      padding-bottom: 1.5rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand-icon {
      background: linear-gradient(135deg, #d4b89c, #c4a484);
      width: 62px;
      height: 62px;
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff5eb;
      font-size: 30px;
      box-shadow: 0 8px 0 #a88d75, 0 15px 25px -8px #b8a088;
      border: 1px solid #e6cfbb;
    }

    .brand-text h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 2.3rem;
      letter-spacing: -0.3px;
      color: #3b2e22;
      line-height: 1.1;
    }

    .brand-text p {
      font-size: 0.9rem;
      font-weight: 400;
      color: #7a6a5a;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .chip {
      background: rgba(235, 220, 205, 0.5);
      backdrop-filter: blur(4px);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: 500;
      font-size: 0.85rem;
      color: #56493d;
      box-shadow: inset 0 0 0 1px #e8d6c5;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #e3d2c0;
    }

    .chip i {
      color: #9e8168;
    }

    /* grid */
    .booking-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 2rem;
    }

    /* Left panel */
    .selection-panel {
      background: rgba(252, 248, 243, 0.7);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 1.8rem 1.8rem 2rem;
      box-shadow: inset 0 1px 4px #fffcf8, 0 12px 22px -14px #bba996;
      border: 1px solid #e9dbce;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.8rem;
    }

    .section-title i {
      background: #dac5b2;
      padding: 10px;
      border-radius: 20px;
      color: #4f3f31;
      font-size: 1.4rem;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 0 #b49f8b;
    }

    .section-title h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.8rem;
      color: #3c2f24;
    }

    /* event type cards */
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .event-card {
      background: white;
      border-radius: 26px;
      padding: 1rem 1.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 5px 0 #d6c4b3, 0 10px 20px -10px #bfae9b;
      border: 1px solid #e1cfbe;
      transition: all 0.2s;
      cursor: pointer;
    }

    .event-card.selected {
      background: #f0e4d8;
      box-shadow: 0 5px 0 #b39a84, 0 12px 24px -8px #ab947f;
      border: 1.5px solid #c4ad98;
    }

    .event-info {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .event-icon {
      background: #e0cfbe;
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #534333;
      font-size: 1.8rem;
    }

    .event-details h3 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #3f3124;
      font-family: 'Playfair Display', serif;
    }

    .event-details span {
      font-size: 0.85rem;
      color: #7a6856;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-price {
      font-weight: 600;
      background: #f3ebe3;
      padding: 8px 20px;
      border-radius: 40px;
      color: #625140;
      font-size: 1.2rem;
      font-family: 'Playfair Display', serif;
    }

    /* rentals section */
    .rentals-section {
      margin: 28px 0 24px;
    }

    .rentals-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .rental-item {
      background: white;
      border-radius: 20px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 3px 0 #dacbbd, 0 6px 12px -6px #c2b1a0;
      border: 1px solid #e5d3c2;
      cursor: pointer;
      transition: 0.1s;
    }

    .rental-item.selected {
      background: #e8d9cb;
      box-shadow: 0 3px 0 #b49f8c;
      border-color: #bea692;
    }

    .rental-item i {
      width: 36px;
      height: 36px;
      background: #e7d9cc;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b5845;
    }

    .rental-info {
      flex: 1;
    }

    .rental-info h4 {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .rental-info p {
      font-size: 0.8rem;
      color: #7d6b5a;
    }

    .rental-price {
      font-weight: 600;
      color: #5f4d3b;
    }

    /* date/time */
    .date-section {
      margin: 24px 0 20px;
    }

    .label-icon {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-weight: 500;
      color: #5b4d40;
    }

    .date-selector {
      background: white;
      border-radius: 24px;
      padding: 8px 18px 8px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 5px 0 #d6c4b3, inset 0 1px 3px #fffcf8;
      border: 1px solid #ddcebe;
    }

    .date-selector input {
      border: none;
      background: transparent;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      padding: 15px 0;
      font-weight: 500;
      color: #463a2f;
      outline: none;
      width: 100%;
    }

    .time-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 16px 0 8px;
    }

    .time-slot {
      background: white;
      border-radius: 40px;
      padding: 11px 5px;
      text-align: center;
      font-weight: 500;
      color: #554738;
      box-shadow: 0 4px 0 #d6c4b3, 0 6px 12px -6px #bdaa98;
      border: 1px solid #dfcfbf;
      cursor: pointer;
    }

    .time-slot.selected {
      background: #a78d77;
      box-shadow: 0 4px 0 #735f4e;
      color: white;
      border-color: #8f7762;
    }

    /* Right panel */
    .booking-form-panel {
      background: rgba(250, 245, 239, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 1.8rem 2rem 2rem;
      box-shadow: inset 0 1px 4px #fffcf8, 0 12px 22px -14px #bba996;
      border: 1px solid #e6d7c8;
      display: flex;
      flex-direction: column;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #56483b;
    }

    .input-wrapper {
      background: white;
      border-radius: 40px;
      padding: 4px 20px;
      box-shadow: 0 4px 0 #d6c4b3, inset 0 1px 3px #fff;
      border: 1px solid #e0cfbe;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      color: #9a836e;
      margin-right: 14px;
      font-size: 1.1rem;
    }

    .input-wrapper input,
    .input-wrapper select,
    .input-wrapper textarea {
      border: none;
      background: transparent;
      padding: 15px 0;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      width: 100%;
      outline: none;
      color: #3f3226;
      resize: none;
    }

    .input-wrapper textarea {
      min-height: 65px;
      padding: 12px 0;
    }

    /* summary */
    .booking-summary {
      background: rgba(235, 222, 210, 0.6);
      border-radius: 26px;
      padding: 1.6rem;
      margin: 20px 0 26px;
      border: 1px dashed #b9a28e;
      backdrop-filter: blur(4px);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .summary-line.total {
      font-weight: 700;
      font-size: 1.5rem;
      border-top: 1.5px solid #bcab99;
      padding-top: 16px;
      margin-top: 8px;
      color: #413427;
      font-family: 'Playfair Display', serif;
    }

    .book-btn {
      background: #9e856e;
      border: none;
      border-radius: 60px;
      padding: 18px 20px;
      font-family: 'Lato', sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
      color: #fdf8f3;
      box-shadow: 0 10px 0 #6f5c4b, 0 12px 25px -6px #b09b87;
      border: 1px solid #cfbbaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.1s;
      margin-top: auto;
      letter-spacing: 0.5px;
    }

    .book-btn:active {
      transform: translateY(4px);
      box-shadow: 0 6px 0 #6f5c4b, 0 12px 20px -6px #b09b87;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: #7a6959;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 900px) {
      .booking-grid {
        grid-template-columns: 1fr;
      }
      .events-system {
        padding: 1.5rem;
      }
    }
  
    /* ── Mobile Optimizations (650px and below) ── */
    @media (max-width: 650px) {
      html { -webkit-text-size-adjust: 100%; }
      body {
        padding: 0 !important;
        align-items: flex-start !important;
      }
      .events-system {
        padding: 1.2rem 1rem !important;
        border-radius: 0 !important;
        border-left: none !important;
        border-right: none !important;
        box-shadow: none !important;
        min-height: 100vh;
        margin: 0;
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden;
      }
      .header {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 12px !important;
      }
      .header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
      }
      .chip {
        padding: 8px 14px;
        font-size: 0.75rem;
      }
      .brand-text h1 {
        font-size: 1.6rem !important;
      }
      .booking-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 1.2rem !important;
      }
      .selection-panel, .booking-form-panel {
        padding: 1.2rem 1rem !important;
        border-radius: 22px !important;
      }
      .event-card {
        padding: 0.9rem 1rem !important;
        flex-wrap: wrap;
        gap: 10px;
        border-radius: 18px !important;
      }
      .event-info {
        gap: 12px;
        min-width: 0;
        flex: 1;
      }
      .event-icon {
        width: 44px !important;
        height: 44px !important;
        font-size: 1.4rem !important;
        flex-shrink: 0;
        border-radius: 14px !important;
      }
      .event-details h3 { font-size: 0.95rem; }
      .event-details span { font-size: 0.78rem; }
      .event-price {
        font-size: 1rem;
        padding: 6px 12px;
      }
      .rentals-grid {
        grid-template-columns: 1fr !important;
      }
      .rental-item {
        padding: 0.8rem 1rem !important;
      }
      .time-slots {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      .time-slot {
        padding: 13px 5px !important;
        font-size: 0.85rem;
        min-height: 46px;
      }
      .input-wrapper input,
      .input-wrapper textarea,
      .input-wrapper select {
        font-size: 16px !important;
      }
      .date-selector input { font-size: 16px !important; }
      .summary-line.total {
        font-size: 1.2rem !important;
      }
      .book-btn {
        padding: 15px 20px !important;
        font-size: 1.05rem !important;
        min-height: 52px;
      }
      .footer-note {
        font-size: 0.78rem;
        gap: 8px;
      }
    }

    @media (max-width: 400px) {
      .brand-text h1 { font-size: 1.35rem !important; }
      .chip { font-size: 0.7rem; padding: 6px 10px; }
      .selection-panel, .booking-form-panel { padding: 1rem 0.875rem !important; }
    }
  </style>

</head>
<body>
<div class="events-system">
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <i class="fas fa-champagne-glasses"></i>
      </div>
      <div class="brand-text">
        <h1>Gather & Grace</h1>
        <p><i class="fas fa-map-pin"></i> Portland · Seattle · Willamette Valley  <i class="fas fa-star" style="margin:0 8px;"></i> 5.0 (340+ events)</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="chip"><i class="fas fa-truck"></i> delivery & setup</div>
      <div class="chip"><i class="fas fa-calendar-check"></i> 2026 dates open</div>
    </div>
  </div>

  <!-- Grid -->
  <div class="booking-grid">
    <!-- LEFT -->
    <div class="selection-panel">
      <div class="section-title">
        <i class="fas fa-calendar-star"></i>
        <h2>event type</h2>
      </div>

      <div class="event-list" id="eventList"></div>

      <!-- Rentals add-ons -->
      <div class="rentals-section">
        <div class="label-icon">
          <i class="fas fa-chair"></i>
          <span>rental items (optional)</span>
        </div>
        <div class="rentals-grid" id="rentalsGrid"></div>
      </div>

      <div class="date-section">
        <div class="label-icon">
          <i class="fas fa-calendar-range"></i>
          <span>event date</span>
        </div>
        <div class="date-selector">
          <input type="date" id="datePicker" value="2026-06-20" min="2026-04-20">
          <i class="fas fa-calendar-alt"></i>
        </div>
      </div>

      <div>
        <div class="label-icon">
          <i class="fas fa-clock"></i>
          <span>start time</span>
        </div>
        <div class="time-slots" id="timeSlotsContainer"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="booking-form-panel">
      <div class="section-title" style="margin-bottom: 1.2rem;">
        <i class="fas fa-user-group"></i>
        <h2>host details</h2>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> full name</label>
        <div class="input-wrapper">
          <i class="fas fa-pen"></i>
          <input type="text" id="fullName" placeholder="e.g., Alexandra Morgan" value="Michael & Lauren">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> email</label>
        <div class="input-wrapper">
          <i class="fas fa-paper-plane"></i>
          <input type="email" id="email" placeholder="hello@event.com" value="michael.lauren@email.com">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-phone"></i> phone</label>
        <div class="input-wrapper">
          <i class="fas fa-mobile"></i>
          <input type="tel" id="phone" placeholder="(503) 555-0123" value="(503) 555-0147">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-users"></i> guest count</label>
        <div class="input-wrapper">
          <i class="fas fa-people-group"></i>
          <select id="guestCount">
            <option value="20-40">20–40 guests</option>
            <option value="40-75" selected>40–75 guests</option>
            <option value="75-120">75–120 guests</option>
            <option value="120+">120+ guests</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-location-dot"></i> venue / address</label>
        <div class="input-wrapper">
          <i class="fas fa-building"></i>
          <input type="text" id="venue" placeholder="Venue name or address" value="The Greenhouse PDX">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-message"></i> special notes</label>
        <div class="input-wrapper">
          <i class="fas fa-feather"></i>
          <textarea id="notes" placeholder="Dietary, setup preferences...">outdoor ceremony, indoor reception</textarea>
        </div>
      </div>

      <!-- Summary -->
      <div class="booking-summary" id="summaryBox">
        <div class="summary-line"><span><i class="fas fa-glass-cheers"></i> Event</span> <span id="summaryEvent">—</span></div>
        <div class="summary-line"><span><i class="fas fa-couch"></i> Rentals</span> <span id="summaryRentals">none selected</span></div>
        <div class="summary-line"><span><i class="fas fa-calendar"></i> Date & time</span> <span id="summaryDateTime">—</span></div>
        <div class="summary-line"><span><i class="fas fa-user"></i> Guests</span> <span id="summaryGuests">40–75</span></div>
        <div class="summary-line total"><span>estimated total</span> <span id="summaryTotal">$0</span></div>
      </div>

      <button class="book-btn" id="bookButton"><i class="fas fa-envelope-open-text"></i> request booking</button>
      <div class="footer-note">
        <span><i class="fas fa-shield"></i> 25% deposit</span>
        <span><i class="fas fa-rotate-left"></i> free cancel 14d</span>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // Event packages
    const events = [
      { id: 'wedding', name: 'Wedding Package', description: 'Full planning · coordination', basePrice: 3500, icon: 'fa-ring' },
      { id: 'corporate', name: 'Corporate Event', description: 'Conference · gala · mixer', basePrice: 2200, icon: 'fa-briefcase' },
      { id: 'social', name: 'Social Gathering', description: 'Birthday · anniversary · shower', basePrice: 1500, icon: 'fa-cake-candles' },
      { id: 'micro', name: 'Micro Event / Elopement', description: 'Intimate · up to 30 guests', basePrice: 950, icon: 'fa-heart' }
    ];

    // Rental items
    const rentals = [
      { id: 'tables', name: 'Farm Tables (8)', price: 240, icon: 'fa-table' },
      { id: 'chairs', name: 'Crossback Chairs (40)', price: 320, icon: 'fa-chair' },
      { id: 'linens', name: 'Premium Linens', price: 180, icon: 'fa-rug' },
      { id: 'lighting', name: 'String Lighting', price: 290, icon: 'fa-lightbulb' },
      { id: 'bar', name: 'Mobile Bar Setup', price: 400, icon: 'fa-martini-glass' },
      { id: 'lounge', name: 'Lounge Furniture Set', price: 550, icon: 'fa-couch' }
    ];

    const timeSlots = ["2:00 PM", "3:30 PM", "5:00 PM", "6:30 PM", "8:00 PM"];

    // State
    let selectedEventId = events[0].id;
    let selectedDate = "2026-06-20";
    let selectedTime = timeSlots[2];
    let selectedRentals = new Set(); // store rental ids

    // DOM
    const eventListEl = document.getElementById('eventList');
    const rentalsGrid = document.getElementById('rentalsGrid');
    const datePicker = document.getElementById('datePicker');
    const timeSlotsContainer = document.getElementById('timeSlotsContainer');
    const summaryEvent = document.getElementById('summaryEvent');
    const summaryRentals = document.getElementById('summaryRentals');
    const summaryDateTime = document.getElementById('summaryDateTime');
    const summaryGuests = document.getElementById('summaryGuests');
    const summaryTotal = document.getElementById('summaryTotal');
    const guestSelect = document.getElementById('guestCount');
    const bookBtn = document.getElementById('bookButton');

    function getSelectedEvent() {
      return events.find(e => e.id === selectedEventId) || events[0];
    }

    function calculateTotal() {
      const event = getSelectedEvent();
      let rentalTotal = 0;
      selectedRentals.forEach(rentalId => {
        const rental = rentals.find(r => r.id === rentalId);
        if (rental) rentalTotal += rental.price;
      });
      return event.basePrice + rentalTotal;
    }

    function renderEvents() {
      let html = '';
      events.forEach(event => {
        const selectedClass = event.id === selectedEventId ? 'selected' : '';
        html += `
          <div class="event-card ${selectedClass}" data-event-id="${event.id}">
            <div class="event-info">
              <div class="event-icon"><i class="fas ${event.icon}"></i></div>
              <div class="event-details">
                <h3>${event.name}</h3>
                <span>${event.description}</span>
              </div>
            </div>
            <div class="event-price">$${event.basePrice}+</div>
          </div>
        `;
      });
      eventListEl.innerHTML = html;

      document.querySelectorAll('.event-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.eventId;
          if (id) {
            selectedEventId = id;
            renderEvents();
            updateSummary();
          }
        });
      });
    }

    function renderRentals() {
      let html = '';
      rentals.forEach(rental => {
        const selectedClass = selectedRentals.has(rental.id) ? 'selected' : '';
        html += `
          <div class="rental-item ${selectedClass}" data-rental-id="${rental.id}">
            <i class="fas ${rental.icon}"></i>
            <div class="rental-info">
              <h4>${rental.name}</h4>
              <p>+$${rental.price}</p>
            </div>
            <div class="rental-price">${selectedRentals.has(rental.id) ? '✓' : '+'}</div>
          </div>
        `;
      });
      rentalsGrid.innerHTML = html;

      document.querySelectorAll('.rental-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const rentalId = item.dataset.rentalId;
          if (selectedRentals.has(rentalId)) {
            selectedRentals.delete(rentalId);
          } else {
            selectedRentals.add(rentalId);
          }
          renderRentals();
          updateSummary();
        });
      });
    }

    function renderTimeSlots() {
      let slotsHtml = '';
      timeSlots.forEach(slot => {
        const selectedClass = slot === selectedTime ? 'selected' : '';
        slotsHtml += `<div class="time-slot ${selectedClass}" data-time="${slot}">${slot}</div>`;
      });
      timeSlotsContainer.innerHTML = slotsHtml;

      document.querySelectorAll('.time-slot').forEach(slotEl => {
        slotEl.addEventListener('click', () => {
          const time = slotEl.dataset.time;
          if (time) {
            selectedTime = time;
            renderTimeSlots();
            updateSummary();
          }
        });
      });
    }

    function updateSummary() {
      const event = getSelectedEvent();
      summaryEvent.textContent = event.name;
      
      const rentalNames = [];
      selectedRentals.forEach(id => {
        const r = rentals.find(r => r.id === id);
        if (r) rentalNames.push(r.name);
      });
      summaryRentals.textContent = rentalNames.length ? rentalNames.join(', ') : 'none selected';
      
      const dateObj = selectedDate ? new Date(selectedDate + 'T12:00:00') : new Date();
      const formattedDate = dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      summaryDateTime.textContent = `${formattedDate} at ${selectedTime}`;
      
      summaryGuests.textContent = guestSelect.options[guestSelect.selectedIndex]?.text || guestSelect.value;
      
      const total = calculateTotal();
      summaryTotal.textContent = `$${total}`;
    }

    function initDatePicker() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      datePicker.min = `${yyyy}-${mm}-${dd}`;
      if (!datePicker.value) datePicker.value = selectedDate;
      else selectedDate = datePicker.value;

      datePicker.addEventListener('change', (e) => {
        selectedDate = e.target.value;
        updateSummary();
      });
    }

    function handleBooking() {
      const event = getSelectedEvent();
      const name = document.getElementById('fullName').value.trim() || 'Host';
      const email = document.getElementById('email').value.trim() || '—';
      const phone = document.getElementById('phone').value.trim() || '—';
      const venue = document.getElementById('venue').value.trim() || 'TBD';
      const guests = guestSelect.options[guestSelect.selectedIndex]?.text || guestSelect.value;
      const notes = document.getElementById('notes').value.trim() || 'none';
      
      const rentalList = [];
      selectedRentals.forEach(id => {
        const r = rentals.find(r => r.id === id);
        if (r) rentalList.push(`${r.name} (+$${r.price})`);
      });
      
      const dateObj = new Date(selectedDate + 'T12:00:00');
      const niceDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      
      const total = calculateTotal();
      
      alert(`🎉 𝐁𝐎𝐎𝐊𝐈𝐍𝐆 𝐑𝐄𝐐𝐔𝐄𝐒𝐓 𝐒𝐄𝐍𝐓 🎉\n\n${event.name}\n📅 ${niceDate} at ${selectedTime}\n📍 ${venue}\n👥 ${guests}\n🪑 Rentals: ${rentalList.length ? rentalList.join('; ') : 'none'}\n💰 Estimated total: $${total}\n👤 ${name} | ${email}\n\nWe'll confirm within 24h. A 25% deposit secures your date!`);
    }

    function initialize() {
      renderEvents();
      renderRentals();
      renderTimeSlots();
      initDatePicker();
      updateSummary();

      guestSelect.addEventListener('change', updateSummary);
    }

    bookBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleBooking();
    });

    initialize();
  })();
</script>
</body>
</html>
