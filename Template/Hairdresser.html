<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blush & Braids · Hair & Beauty</title>
  <!-- Poppins & Playfair Display for girly vibe -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fce9f2 0%, #ffe6f0 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3d2b3b;
    }

    /* main girly card */
    .booking-system {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 250, 245, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 42px;
      box-shadow: 0 25px 45px -8px rgba(210, 120, 160, 0.25),
                  0 8px 20px rgba(245, 175, 200, 0.2),
                  inset 0 0 0 1px rgba(255, 255, 255, 0.8);
      padding: 2.2rem 2.5rem;
      border: 1px solid #fff3f9;
    }

    /* HEADER — super feminine */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 15px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-icon {
      background: #fec7d7;
      width: 56px;
      height: 56px;
      border-radius: 30px 18px 30px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b3406c;
      font-size: 28px;
      box-shadow: 0 6px 0 #e7a1b8, 0 12px 20px -8px #eeb7cb;
      transition: transform 0.2s ease;
    }

    .brand-icon i {
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
    }

    .brand-text h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      color: #572c41;
      line-height: 1.1;
    }

    .brand-text p {
      font-size: 0.95rem;
      font-weight: 400;
      color: #a55b78;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }

    .brand-text p i {
      font-size: 12px;
      color: #d9779e;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .pill-badge {
      background: #ffffffd4;
      backdrop-filter: blur(4px);
      padding: 10px 20px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #673f53;
      box-shadow: 0 4px 10px #f3cedb, inset 0 0 0 1px #fff3f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill-badge i {
      color: #c95f87;
      font-size: 1rem;
    }

    /* main layout: two columns */
    .booking-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 2rem;
    }

    /* LEFT SIDE — services + date picker + time */
    .selection-panel {
      background: #fff9fcde;
      border-radius: 32px;
      padding: 1.8rem 1.8rem 2rem;
      box-shadow: inset 0 1px 4px #fff, 0 12px 18px -10px #e7b9cb;
      border: 1px solid #ffe7f1;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.8rem;
    }

    .section-title i {
      background: #fec5d9;
      padding: 8px;
      border-radius: 18px;
      color: #a0345e;
      font-size: 1.3rem;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 0 #e4a1b8;
    }

    .section-title h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.8rem;
      color: #462536;
    }

    /* service cards */
    .service-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 2.2rem;
    }

    .service-card {
      background: white;
      border-radius: 28px;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 5px 0 #f9cedf, 0 8px 16px -8px #e6a6bb;
      border: 1px solid #ffd9e9;
      transition: all 0.15s;
      cursor: pointer;
    }

    .service-card.selected {
      background: #ffe2f0;
      box-shadow: 0 5px 0 #dd8fad, 0 8px 20px -6px #d882a6;
      border: 1.5px solid #dc7d9c;
      transform: scale(1.01);
    }

    .service-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .service-icon {
      background: #fbd1e2;
      width: 52px;
      height: 52px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a13e62;
      font-size: 1.8rem;
    }

    .service-details h3 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #402131;
    }

    .service-details span {
      font-size: 0.85rem;
      color: #b15b7a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .service-price {
      font-weight: 600;
      background: #ffeef4;
      padding: 8px 16px;
      border-radius: 40px;
      color: #a1395c;
      font-size: 1.2rem;
    }

    /* date & time */
    .date-section {
      margin-bottom: 28px;
    }

    .label-icon {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 500;
      color: #6b3c51;
    }

    .date-selector {
      background: white;
      border-radius: 24px;
      padding: 8px 18px 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 0 #f6c2d8, inset 0 1px 3px #fff1f7;
      border: 1px solid #ffcddf;
    }

    .date-selector input {
      border: none;
      background: transparent;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      padding: 14px 0;
      font-weight: 500;
      color: #462838;
      outline: none;
      width: 100%;
    }

    .date-selector i {
      color: #d9648b;
      font-size: 1.4rem;
    }

    /* time slots girly grid */
    .time-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 20px 0 10px;
    }

    .time-slot {
      background: white;
      border-radius: 40px;
      padding: 12px 5px;
      text-align: center;
      font-weight: 500;
      color: #4b293a;
      box-shadow: 0 4px 0 #f7c1d6, 0 6px 12px -6px #eab1c4;
      border: 1px solid #ffe2ee;
      cursor: pointer;
      transition: 0.1s;
    }

    .time-slot.selected {
      background: #d86f99;
      box-shadow: 0 4px 0 #ac4870;
      color: white;
      border-color: #c15f85;
    }

    .time-slot:hover {
      background: #fcd3e6;
    }

    /* RIGHT SIDE — booking form & summary */
    .booking-form-panel {
      background: #fff5faf2;
      border-radius: 32px;
      padding: 1.8rem 2rem 2rem;
      box-shadow: inset 0 1px 4px #fff, 0 12px 20px -12px #e1a7bc;
      border: 1px solid #ffe1ee;
      display: flex;
      flex-direction: column;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #62364b;
    }

    .input-wrapper {
      background: white;
      border-radius: 40px;
      padding: 4px 20px;
      box-shadow: 0 4px 0 #f3c3d6, inset 0 1px 3px #fff;
      border: 1px solid #ffd5e5;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      color: #cb6b8e;
      margin-right: 12px;
      font-size: 1.1rem;
    }

    .input-wrapper input,
    .input-wrapper select {
      border: none;
      background: transparent;
      padding: 14px 0;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      width: 100%;
      outline: none;
      color: #2e1a23;
    }

    .input-wrapper select {
      cursor: pointer;
    }

    /* summary card */
    .booking-summary {
      background: #ffecf3e0;
      border-radius: 26px;
      padding: 1.5rem;
      margin: 20px 0 24px;
      border: 1px dashed #e387aa;
      backdrop-filter: blur(4px);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 1rem;
    }

    .summary-line.total {
      font-weight: 700;
      font-size: 1.4rem;
      border-top: 1.5px solid #eeb0c5;
      padding-top: 14px;
      margin-top: 6px;
      color: #772e4e;
    }

    .book-btn {
      background: #d86694;
      border: none;
      border-radius: 60px;
      padding: 18px 20px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1.3rem;
      color: white;
      box-shadow: 0 10px 0 #9b4265, 0 12px 25px -6px #dd85a7;
      border: 1px solid #ffc0d6;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: 0.1s;
      margin-top: auto;
    }

    .book-btn:active {
      transform: translateY(4px);
      box-shadow: 0 6px 0 #9b4265, 0 12px 20px -6px #dd85a7;
    }

    .book-btn i {
      font-size: 1.5rem;
    }

    .footer-note {
      margin-top: 15px;
      text-align: center;
      color: #b15b7a;
      font-size: 0.8rem;
    }

    /* responsiveness */
    @media (max-width: 850px) {
      .booking-grid {
        grid-template-columns: 1fr;
      }
      body {
        padding: 1rem;
      }
      .booking-system {
        padding: 1.5rem;
      }
      .time-slots {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 480px) {
      .time-slots {
        grid-template-columns: repeat(2, 1fr);
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* little sparkles */
    .glitter {
      background-image: radial-gradient(circle at 20% 30%, #fff9fc 2px, transparent 2px);
      background-size: 16px 16px;
    }
  
    /* ── Mobile Optimizations (650px and below) ── */
    @media (max-width: 650px) {
      html { -webkit-text-size-adjust: 100%; }
      body {
        padding: 0 !important;
        align-items: flex-start !important;
      }
      .booking-system {
        padding: 1.2rem 1rem !important;
        border-radius: 0 !important;
        border-left: none !important;
        border-right: none !important;
        box-shadow: none !important;
        min-height: 100vh;
        margin: 0;
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden;
      }
      .header {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 12px !important;
      }
      .header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
      }
      .pill-badge {
        padding: 8px 14px;
        font-size: 0.78rem;
      }
      .brand-text h1 {
        font-size: 1.6rem !important;
      }
      .booking-grid {
        display: flex !important;
        flex-direction: column !important;
        gap: 1.2rem !important;
      }
      .selection-panel, .booking-form-panel {
        padding: 1.2rem 1rem !important;
        border-radius: 24px !important;
      }
      .service-card {
        padding: 0.9rem 1rem !important;
        flex-wrap: wrap;
        gap: 10px;
        border-radius: 20px !important;
      }
      .service-info {
        gap: 12px;
        min-width: 0;
        flex: 1;
      }
      .service-icon {
        width: 42px !important;
        height: 42px !important;
        font-size: 1.3rem !important;
        flex-shrink: 0;
        border-radius: 14px !important;
      }
      .service-details h3 { font-size: 0.95rem; }
      .service-details span { font-size: 0.78rem; }
      .service-price {
        font-size: 1rem;
        padding: 6px 12px;
      }
      .time-slots {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      .time-slot {
        padding: 13px 5px !important;
        font-size: 0.85rem;
        min-height: 46px;
      }
      .input-wrapper input,
      .input-wrapper select {
        font-size: 16px !important;
      }
      .date-selector input { font-size: 16px !important; }
      .summary-line.total {
        font-size: 1.1rem !important;
      }
      .book-btn {
        padding: 15px 20px !important;
        font-size: 1.05rem !important;
        min-height: 52px;
      }
    }

    @media (max-width: 400px) {
      .brand-text h1 { font-size: 1.3rem !important; }
      .pill-badge { font-size: 0.7rem; padding: 6px 10px; }
      .selection-panel, .booking-form-panel { padding: 1rem 0.875rem !important; }
      .service-card { padding: 0.8rem 0.875rem !important; }
    }
  </style>

</head>
<body>
<div class="booking-system glitter">
  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <i class="fas fa-spa"></i>
      </div>
      <div class="brand-text">
        <h1>Blush & Braids</h1>
        <p><i class="fas fa-map-pin"></i> 124 Rose Avenue · since 2016  <i class="fas fa-star" style="margin-left: 8px;"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></p>
      </div>
    </div>
    <div class="header-actions">
      <div class="pill-badge"><i class="fas fa-gem"></i> members club</div>
      <div class="pill-badge"><i class="fas fa-heart"></i> 10% off first visit</div>
    </div>
  </div>

  <!-- BOOKING GRID -->
  <div class="booking-grid">
    <!-- LEFT: Service & date/time -->
    <div class="selection-panel">
      <div class="section-title">
        <i class="fas fa-scissors"></i>
        <h2>pick your magic</h2>
      </div>

      <!-- services list -->
      <div class="service-list" id="serviceList">
        <!-- JS will populate, but static fallback -->
      </div>

      <div class="date-section">
        <div class="label-icon">
          <i class="fas fa-calendar-heart"></i>
          <span>choose your date</span>
        </div>
        <div class="date-selector">
          <input type="date" id="datePicker" value="2026-04-22" min="2026-04-20">
          <i class="fas fa-calendar-alt"></i>
        </div>
      </div>

      <div>
        <div class="label-icon">
          <i class="fas fa-clock"></i>
          <span>select time</span>
        </div>
        <div class="time-slots" id="timeSlotsContainer">
          <!-- time slots rendered by js -->
        </div>
      </div>
      <div style="margin-top: 14px; font-size: 0.85rem; color: #a04d6b;">
        <i class="fas fa-sparkles" style="margin-right: 6px;"></i> all appointments include a complimentary drink
      </div>
    </div>

    <!-- RIGHT: Booking form & summary -->
    <div class="booking-form-panel">
      <div class="section-title" style="margin-bottom: 1.2rem;">
        <i class="fas fa-feather-alt"></i>
        <h2>your details</h2>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user-circle"></i> full name</label>
        <div class="input-wrapper">
          <i class="fas fa-smile"></i>
          <input type="text" id="fullName" placeholder="e.g., Olivia Rose" value="Bella Swan">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-envelope"></i> email</label>
        <div class="input-wrapper">
          <i class="fas fa-paper-plane"></i>
          <input type="email" id="email" placeholder="bella@blush.com" value="bella@blush.com">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-phone-alt"></i> phone</label>
        <div class="input-wrapper">
          <i class="fas fa-mobile-alt"></i>
          <input type="tel" id="phone" placeholder="+1 (555) 000-9999" value="(212) 555-0198">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user-tag"></i> stylist preference</label>
        <div class="input-wrapper">
          <i class="fas fa-star"></i>
          <select id="stylistSelect">
            <option value="any">🌸 Any available (recommended)</option>
            <option value="Chloe">💇‍♀️ Chloe (balayage queen)</option>
            <option value="Maya">✨ Maya (curls & bridal)</option>
            <option value="Sasha">🎀 Sasha (precision cuts)</option>
          </select>
        </div>
      </div>

      <!-- Booking summary -->
      <div class="booking-summary" id="summaryBox">
        <div class="summary-line"><span><i class="fas fa-cut" style="margin-right: 8px;"></i>Service</span> <span id="summaryService">—</span></div>
        <div class="summary-line"><span><i class="fas fa-calendar-day"></i> Date & time</span> <span id="summaryDateTime">—</span></div>
        <div class="summary-line total"><span>total</span> <span id="summaryTotal">$0</span></div>
      </div>

      <button class="book-btn" id="bookButton"><i class="fas fa-magic"></i> book now · glow</button>
      <div class="footer-note">
        <i class="fas fa-lock" style="margin-right: 6px;"></i> secure booking · cancel free up to 6h before
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ----- GIRLY SERVICES DATA -----
    const services = [
      { id: 1, name: "Blowout & Style", duration: "45 min", price: 55, icon: "fa-wind" },
      { id: 2, name: "Balayage / Highlights", duration: "2h 30min", price: 180, icon: "fa-paint-brush" },
      { id: 3, name: "Haircut & Treatment", duration: "1h 15min", price: 85, icon: "fa-cut" },
      { id: 4, name: "Bridal / Updo", duration: "1h 30min", price: 120, icon: "fa-crown" }
    ];

    // time slots (girly times)
    const timeSlots = ["10:00 AM", "11:30 AM", "1:00 PM", "2:30 PM", "4:00 PM", "5:30 PM"];

    // state
    let selectedServiceId = services[0].id;          // default first
    let selectedDate = "2026-04-22";                 // default
    let selectedTime = timeSlots[2];                 // "1:00 PM"

    // DOM elements
    const serviceListEl = document.getElementById('serviceList');
    const datePicker = document.getElementById('datePicker');
    const timeSlotsContainer = document.getElementById('timeSlotsContainer');
    const summaryService = document.getElementById('summaryService');
    const summaryDateTime = document.getElementById('summaryDateTime');
    const summaryTotal = document.getElementById('summaryTotal');
    const fullNameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('email');
    const phoneInput = document.getElementById('phone');
    const stylistSelect = document.getElementById('stylistSelect');
    const bookBtn = document.getElementById('bookButton');

    // helper: get service object
    function getSelectedService() {
      return services.find(s => s.id === selectedServiceId) || services[0];
    }

    // render service cards
    function renderServices() {
      let html = '';
      services.forEach(service => {
        const selectedClass = service.id === selectedServiceId ? 'selected' : '';
        html += `
          <div class="service-card ${selectedClass}" data-service-id="${service.id}">
            <div class="service-info">
              <div class="service-icon"><i class="fas ${service.icon}"></i></div>
              <div class="service-details">
                <h3>${service.name}</h3>
                <span><i class="far fa-clock"></i> ${service.duration}</span>
              </div>
            </div>
            <div class="service-price">$${service.price}</div>
          </div>
        `;
      });
      serviceListEl.innerHTML = html;

      // attach click listeners
      document.querySelectorAll('.service-card').forEach(card => {
        card.addEventListener('click', (e) => {
          const id = parseInt(card.dataset.serviceId);
          if (!isNaN(id)) {
            selectedServiceId = id;
            renderServices();          // re-render to show selection
            updateSummary();
          }
        });
      });
    }

    // render time slots
    function renderTimeSlots() {
      let slotsHtml = '';
      timeSlots.forEach(slot => {
        const selectedClass = slot === selectedTime ? 'selected' : '';
        slotsHtml += `<div class="time-slot ${selectedClass}" data-time="${slot}">${slot}</div>`;
      });
      timeSlotsContainer.innerHTML = slotsHtml;

      document.querySelectorAll('.time-slot').forEach(slotEl => {
        slotEl.addEventListener('click', () => {
          const time = slotEl.dataset.time;
          if (time) {
            selectedTime = time;
            renderTimeSlots();
            updateSummary();
          }
        });
      });
    }

    // update summary panel
    function updateSummary() {
      const service = getSelectedService();
      summaryService.textContent = `${service.name} · $${service.price}`;
      
      // format date nicely
      const dateObj = selectedDate ? new Date(selectedDate + 'T12:00:00') : new Date();
      const options = { weekday: 'short', month: 'short', day: 'numeric' };
      const formattedDate = dateObj.toLocaleDateString('en-US', options);
      
      summaryDateTime.textContent = `${formattedDate} at ${selectedTime}`;
      summaryTotal.textContent = `$${service.price}`;
    }

    // initial set date from picker
    function initDatePicker() {
      // set min to today (girly & practical)
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayStr = `${yyyy}-${mm}-${dd}`;
      datePicker.min = todayStr;
      
      if (!datePicker.value) {
        datePicker.value = selectedDate;
      } else {
        selectedDate = datePicker.value;
      }

      datePicker.addEventListener('change', (e) => {
        selectedDate = e.target.value;
        updateSummary();
      });
    }

    // booking action
    function handleBooking() {
      const service = getSelectedService();
      const name = fullNameInput.value.trim() || 'Guest';
      const email = emailInput.value.trim() || 'not provided';
      const phone = phoneInput.value.trim() || 'not provided';
      const stylist = stylistSelect.value;
      
      const dateObj = new Date(selectedDate + 'T12:00:00');
      const niceDate = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      
      // girly popup / alert
      alert(`✨ 𝐁𝐎𝐎𝐊𝐈𝐍𝐆 𝐂𝐎𝐍𝐅𝐈𝐑𝐌𝐄𝐃 ✨\n\n${service.name} with ${stylist === 'any' ? 'our best stylist' : stylist}\n📅 ${niceDate} at ${selectedTime}\n👤 ${name}\n💌 ${email}\n\nA confirmation has been sent. See you soon, beauty! 💖`);
    }

    // update everything on load & sync
    function initialize() {
      renderServices();
      renderTimeSlots();
      initDatePicker();
      updateSummary();

      // if date picker changes, keep in sync
      datePicker.addEventListener('change', () => {
        selectedDate = datePicker.value;
        updateSummary();
      });
    }

    // attach book button
    bookBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleBooking();
    });

    // tiny extra: if name/email pre-filled but we still show summary
    // also update summary on any input? not necessary, but we keep fresh
    initialize();

    // optional: re-summary after service selection (already done)
    // also watch for changes on stylist? doesn't affect price, but it's okay.
  })();
</script>
</body>
</html>
