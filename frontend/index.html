<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary brand identity -->
    <title>ICSS Booking System — Appointments, Bookings & Scheduling</title>
    <meta name="description" content="ICSS Booking System: the modern scheduling platform built in Jamaica for service businesses across the Caribbean and beyond. Manage appointments, staff, and payments online." />

    <!-- App routes are protected/internal — noindex by default; individual pages override via SEO component -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0a0b0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ICSS Booking" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://icssbookings.com/" />
    <meta property="og:title"       content="ICSS Booking System — Built in Jamaica" />
    <meta property="og:description" content="Schedule appointments, manage staff, and accept payments — all from one platform built for Caribbean businesses." />
    <meta property="og:image"       content="https://icssbookings.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ICSS Booking System" />
    <meta name="twitter:description" content="Modern scheduling for Caribbean businesses. Manage appointments, staff, and payments online." />
    <meta name="twitter:image"       content="https://icssbookings.com/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
