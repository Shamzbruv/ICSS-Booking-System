openapi: 3.0.3
info:
  title: ICSS Booking API
  version: 1.0.0
  description: Commercial SaaS API for booking operations
paths:
  /api/v1/bookings:
    post:
      summary: Construct a new booking slot
      responses:
        '201':
          description: Created
    get:
      summary: Retrieve paginated booking lists
      responses:
        '200':
          description: Request fulfilled
  /api/v1/calendar/connect/{provider}:
    get:
      summary: Starts OAuth Consent flow
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
  /api/v1/calendar/oauth2callback/{provider}:
    get:
      summary: Handles the return OAuth callback code
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
  /api/v1/calendar/webhook/google:
    post:
      summary: External push hook listener for Google
  /api/v1/calendar/feed/{feed_token}.ics:
    get:
      summary: Generate private read-only .ics file feed for Apple devices
      parameters:
        - in: path
          name: feed_token
          required: true
          schema:
            type: string
            format: uuid
