<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICSS Admin — Payment Settings</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global-theme.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="gradient-bg"></div>
<div class="grid-pattern"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div style="display: flex; align-items: center; gap: 10px;">
              <img src="./favicon.png" alt="ICSS Icon" style="width: 36px; height: 36px; border-radius: 8px; object-fit: contain;">
              <div style="display: flex; flex-direction: column; justify-content: center;">
                <span style="font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 1.2rem; background: linear-gradient(135deg, #ffffff, #a5b4fc); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1;">ICSS</span>
                <span style="font-size: 0.45rem; letter-spacing: 1px; color: #8888aa; font-weight: 600; line-height: 1; margin-top: 2px;">BOOKING MANAGEMENT</span>
              </div>
            </div>
        <div class="brand-text">
            <span class="brand-name" id="tenantName">Booking System</span>
            <span class="brand-plan" id="tenantPlan"></span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">⬛</span> Dashboard</a>
        <a href="bookings.html" class="nav-item"><span class="nav-icon">📅</span> Bookings</a>
        <a href="availability.html" class="nav-item"><span class="nav-icon">🗓️</span> Availability</a>
        <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙️</span> Settings</a>
        <a href="services.html" class="nav-item"><span class="nav-icon">📦</span> Services</a>
    </nav>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <h1 class="page-title">Payment Settings</h1>
            <p class="page-subtitle">Configure WiPay and Bank Transfer instructions.</p>
        </div>
    </header>

    <section class="card" style="max-width: 800px; margin: 0 auto;">
        <form id="settingsForm" class="form-grid">
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Default Payment Mode</label>
                <select id="default_payment_mode" class="form-control">
                    <option value="none">No Payment Required</option>
                    <option value="wipay">WiPay</option>
                    <option value="manual">Manual Bank Transfer</option>
                </select>
            </div>

            <div class="form-group" style="grid-column: 1 / -1; display: flex; gap: 1rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 14px;">
                    <input type="checkbox" id="wipay_enabled" style="width: 18px; height: 18px;"> Enable WiPay
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 14px;">
                    <input type="checkbox" id="manual_payment_enabled" style="width: 18px; height: 18px;"> Enable Bank Transfer
                </label>
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Hold Timeout (Minutes)</label>
                <input type="number" id="hold_timeout_minutes" class="form-control" value="15" min="5" max="1440">
                <small style="color: var(--text-muted); margin-top: 6px; display: block;">How long pending bookings are held before expiring.</small>
            </div>

            <div style="grid-column: 1 / -1;"><hr style="border: 0; border-top: 1px solid var(--border); margin: 1rem 0;"></div>

            <h3 style="grid-column: 1 / -1; font-size: 18px;">WiPay Credentials</h3>
            
            <div class="form-group">
                <label>Merchant Code / Key</label>
                <input type="text" id="wipay_merchant_code" class="form-control" placeholder="Enter WiPay Merchant Key">
            </div>
            
            <div class="form-group">
                <label>Account ID</label>
                <input type="text" id="wipay_account_id" class="form-control" placeholder="Enter WiPay Account ID">
            </div>

            <div style="grid-column: 1 / -1;"><hr style="border: 0; border-top: 1px solid var(--border); margin: 1rem 0;"></div>

            <h3 style="grid-column: 1 / -1; font-size: 18px;">Bank Transfer Instructions</h3>
            
            <div class="form-group" style="grid-column: 1 / -1;">
                <textarea id="bank_transfer_instructions" class="form-control" rows="4" placeholder="Enter instructions for customers paying via bank transfer..."></textarea>
            </div>

            <div class="form-actions" style="grid-column: 1 / -1; margin-top: 1rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save Settings</button>
            </div>
        </form>
    </section>
</main>

<script src="js/admin.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        requireAuth();
        await loadSettings();

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await saveSettings();
        });
    });

    let currentSlug = '';

    async function loadSettings() {
        try {
            // We get the tenant slug from /auth/me
            const user = await apiFetch('/api/v1/auth/me');
            if (user && user.tenant) {
                currentSlug = user.tenant.slug;
                
                // Fetch tenant details
                const data = await apiFetch(`/api/v1/public/tenant`, { headers: { 'X-Tenant-Slug': currentSlug } });
                // Note: The public route doesn't return full payment settings. 
                // We should add a specific GET /api/v1/tenants/:slug/settings route or fetch from the admin.
                // Wait, I can add a specific get to admin!
            }
        } catch (err) {
            console.error('Failed to load settings', err);
        }
    }

    async function saveSettings() {
        const payload = {
            default_payment_mode: document.getElementById('default_payment_mode').value,
            wipay_enabled: document.getElementById('wipay_enabled').checked,
            manual_payment_enabled: document.getElementById('manual_payment_enabled').checked,
            hold_timeout_minutes: document.getElementById('hold_timeout_minutes').value,
            bank_transfer_instructions: document.getElementById('bank_transfer_instructions').value,
            payment_settings: {
                wipay_merchant_code: document.getElementById('wipay_merchant_code').value,
                wipay_account_id: document.getElementById('wipay_account_id').value
            }
        };

        try {
            await apiFetch(`/api/v1/tenants/${currentSlug}/payment-settings`, {
                method: 'PATCH',
                body: payload
            });
            alert('Settings saved successfully!');
        } catch (err) {
            alert('Failed to save settings: ' + err.message);
        }
    }
</script>
</body>
</html>
