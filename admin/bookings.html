    <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICSS Admin — Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global-theme.css">

</head>
<body>

<!-- Global Backgrounds -->
<div class="gradient-bg"></div>

<!-- Mobile hamburger -->
<button class="hamburger" id="hamburgerBtn" aria-label="Open menu"><span></span><span></span><span></span></button>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="grid-pattern"></div>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div style="display: flex; align-items: center; gap: 10px;">
              <img src="./favicon.png" alt="ICSS Icon" style="width: 36px; height: 36px; border-radius: 8px; object-fit: contain;">
              <div style="display: flex; flex-direction: column; justify-content: center;">
                <span style="font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 1.2rem; background: linear-gradient(135deg, #ffffff, #a5b4fc); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1;">ICSS</span>
                <span style="font-size: 0.45rem; letter-spacing: 1px; color: #8888aa; font-weight: 600; line-height: 1; margin-top: 2px;">BOOKING MANAGEMENT</span>
              </div>
            </div>
        <div class="brand-text">
            <span class="brand-name" id="tenantName">Admin</span>
            <span class="brand-plan" id="tenantPlan"></span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">⬛</span> Dashboard</a>
        <a href="bookings.html" class="nav-item active"><span class="nav-icon">📅</span> Bookings</a>
        <a href="availability.html" class="nav-item"><span class="nav-icon">🗓️</span> Availability</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
        <a href="customize.html" class="nav-item"><span class="nav-icon">🎨</span> Customize</a>
        <a href="services.html" class="nav-item"><span class="nav-icon">📦</span> Services</a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">?</div>
            <div><div class="user-name" id="userName">—</div><div class="user-role" id="userRole">—</div></div>
        </div>
        <button class="logout-btn" type="button">Sign Out</button>
    </div>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <h1 class="page-title">Bookings</h1>
            <p class="page-subtitle">Manage all appointments and their statuses</p>
        </div>
    </header>

    <div class="table-wrap">
        <div class="table-toolbar">
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <input type="date" id="filterDate" style="max-width:170px;">
                <select id="filterStatus">
                    <option value="">All Statuses</option>
                    <option value="pending_payment">Pending PayPal</option>
                    <option value="pending_manual_confirmation">Pending Bank Transfer</option>
                    <option value="pending_after_hours_confirmation">After-hours Requests</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="rejected">Rejected</option>
                    <option value="completed">Completed</option>
                    <option value="no_show">No Show</option>
                </select>
                <input type="text" id="filterSearch" placeholder="Search name, email…" style="min-width:200px;">
            </div>
            <div style="display:flex;gap:8px;">
                <span id="bookingCount" style="font-size:13px;color:var(--text-dim);align-self:center;"></span>
                <button class="btn btn-secondary btn-sm" id="refreshBookingsBtn" type="button" aria-label="Refresh bookings">↻</button>
            </div>
        </div>

        <div id="tableBody">
            <div class="spinner"></div>
        </div>
    </div>
</main>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancelModal">
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Cancel Booking</h2>
            <button class="modal-close" id="cancelModalCloseBtn" type="button" aria-label="Close cancellation dialog">✕</button>
        </div>
        <p style="margin-bottom:16px;color:var(--text-dim);font-size:14px;">
            This will cancel the booking and send an apology email to the customer.
        </p>
        <div class="form-group">
            <label for="cancelReason">Reason for Cancellation (optional)</label>
            <textarea id="cancelReason" rows="3" placeholder="e.g. Staff unavailability, emergency closure..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="cancelModalBackBtn" type="button">Go Back</button>
            <button class="btn btn-danger" id="confirmCancelBtn" type="button">Cancel Booking</button>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
<script>
    let cancelTargetId = null;
    let searchTimer    = null;
    const bookingStatusBusy = new Set();

    document.addEventListener('DOMContentLoaded', () => {
        if (!requireAuth()) return;
        populateUserUI();
        document.getElementById('filterDate').addEventListener('change', loadBookings);
        document.getElementById('filterStatus').addEventListener('change', loadBookings);
        document.getElementById('filterSearch').addEventListener('input', debounceLoad);
        document.getElementById('refreshBookingsBtn').addEventListener('click', loadBookings);
        document.getElementById('cancelModalCloseBtn').addEventListener('click', () => closeModal('cancelModal'));
        document.getElementById('cancelModalBackBtn').addEventListener('click', () => closeModal('cancelModal'));
        document.getElementById('confirmCancelBtn').addEventListener('click', confirmCancel);
        document.getElementById('tableBody').addEventListener('click', handleBookingAction);
        loadBookings();
    });

    function debounceLoad() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadBookings, 400);
    }

    async function loadBookings() {
        const date   = document.getElementById('filterDate').value;
        const status = document.getElementById('filterStatus').value;
        const search = document.getElementById('filterSearch').value;

        const params = new URLSearchParams();
        if (date)   params.set('date', date);
        if (status) params.set('status', status);
        if (search) params.set('search', search);
        params.set('limit', '100');

        document.getElementById('tableBody').innerHTML = '<div class="spinner"></div>';

        try {
            const data = await apiFetch(`/api/v1/bookings?${params}`);
            renderTable(data.bookings || [], data.total || 0);
        } catch (e) {
            document.getElementById('tableBody').innerHTML =
                `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p class="empty-state-text">${escHtml(e.message)}</p></div>`;
        }
    }

    function renderTable(bookings, total) {
        document.getElementById('bookingCount').textContent = `${total} result${total !== 1 ? 's' : ''}`;

        if (bookings.length === 0) {
            document.getElementById('tableBody').innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">📅</div><p class="empty-state-text">No bookings found. Try adjusting your filters.</p></div>';
            return;
        }

        const rows = bookings.map(b => `
            <tr>
                <td data-label="Name"><strong>${escHtml(b.name)}</strong></td>
                <td data-label="Email" style="color:var(--text-dim);">${escHtml(b.email)}</td>
                <td data-label="Phone">${escHtml(b.phone || '—')}</td>
                <td data-label="Date">${formatDate(b.booking_date)}</td>
                <td data-label="Time">${formatTime(b.booking_time)}</td>
                <td data-label="Region">${escHtml(b.region || '—')}</td>
                <td data-label="Status">${statusBadge(b.status)}</td>
                <td data-label="Actions">
                    ${b.status === 'confirmed' ? `
                        <button class="btn btn-secondary btn-sm" type="button" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="completed">✓ Complete</button>
                        <button class="btn btn-danger btn-sm" type="button" data-booking-action="cancel" data-booking-id="${b.id}">✕ Cancel</button>
                    ` : ''}
                    ${b.status === 'pending_manual_confirmation' ? `
                        <button class="btn btn-primary btn-sm" type="button" style="background:#10b981;" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="confirmed" data-booking-note="Bank transfer approved.">✓ Approve Transfer</button>
                        <button class="btn btn-danger btn-sm" type="button" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="rejected" data-booking-note="Bank transfer not received.">✕ Reject</button>
                    ` : ''}
                    ${b.status === 'pending_payment' && b.payment_mode === 'paypal' ? `
                        <button class="btn btn-primary btn-sm" type="button" style="background:#10b981;" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="confirmed" data-booking-note="PayPal payment verified.">✓ Verify PayPal Payment</button>
                        <button class="btn btn-danger btn-sm" type="button" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="rejected" data-booking-note="PayPal payment not received.">✕ Reject</button>
                    ` : ''}
                    ${b.status === 'pending_after_hours_confirmation' ? `
                        <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">After-hours fee: ${escHtml(b.after_hours_fee || '0')}</div>
                        <button class="btn btn-primary btn-sm" type="button" style="background:#10b981;" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="confirmed" data-booking-note="After-hours request approved.">✓ Approve Request</button>
                        <button class="btn btn-danger btn-sm" type="button" data-booking-action="status" data-booking-id="${b.id}" data-booking-status="rejected" data-booking-note="After-hours request unavailable.">✕ Decline</button>
                    ` : ''}
                </td>
            </tr>
        `).join('');

        document.getElementById('tableBody').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Name</th><th>Email</th><th>Phone</th>
                        <th>Date</th><th>Time</th><th>Region</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    function handleBookingAction(event) {
        const button = event.target.closest('[data-booking-action]');
        if (!button) return;
        const id = button.dataset.bookingId;
        if (button.dataset.bookingAction === 'cancel') {
            openCancelModal(id);
            return;
        }
        updateStatus(id, button.dataset.bookingStatus, button.dataset.bookingNote || '', button);
    }

    async function updateStatus(id, newStatus, note = '', triggerButton = null) {
        if (bookingStatusBusy.has(id)) return;
        if (newStatus === 'rejected' && !confirmDialog('Are you sure you want to reject this booking?')) return;
        if (newStatus === 'confirmed' && !confirmDialog('Approve this request and confirm the booking?')) return;

        bookingStatusBusy.add(id);
        const originalText = triggerButton?.textContent;
        document.querySelectorAll(`[data-booking-id="${id}"]`).forEach(button => { button.disabled = true; });
        if (triggerButton) triggerButton.textContent = 'Updating…';
        try {
            await apiFetch(`/api/v1/bookings/${id}/status`, {
                method: 'PATCH',
                body: { status: newStatus, note }
            });
            showToast('Booking status updated to ' + newStatus);
            await loadBookings();
        } catch (e) {
            showToast(e.message, 'error');
            document.querySelectorAll(`[data-booking-id="${id}"]`).forEach(button => { button.disabled = false; });
            if (triggerButton && originalText) triggerButton.textContent = originalText;
        } finally {
            bookingStatusBusy.delete(id);
        }
    }

    function openCancelModal(id) {
        cancelTargetId = id;
        document.getElementById('cancelReason').value = '';
        document.getElementById('cancelModal').classList.add('open');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
        cancelTargetId = null;
    }

    async function confirmCancel() {
        if (!cancelTargetId) return;
        const reason = document.getElementById('cancelReason').value.trim();
        const btn    = document.getElementById('confirmCancelBtn');
        btn.disabled = true; btn.textContent = 'Cancelling...';
        try {
            await apiFetch(`/api/v1/bookings/${cancelTargetId}/cancel`, {
                method: 'POST',
                body: { reason }
            });
            showToast('Booking cancelled. Customer has been notified.');
            closeModal('cancelModal');
            loadBookings();
        } catch (e) {
            showToast(e.message, 'error');
        } finally {
            btn.disabled = false; btn.textContent = 'Cancel Booking';
        }
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
