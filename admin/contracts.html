<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ICSS Admin — Partner Contracts</title><link rel="stylesheet" href="/css/global-theme.css"><link rel="stylesheet" href="css/admin.css"><link rel="icon" href="favicon.png"><style>.contract-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin:14px 0}.contract-meta{color:var(--text-muted);font-size:13px;line-height:1.7}.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px}.sign-grid input{width:100%;box-sizing:border-box}.badge{display:inline-block;padding:4px 9px;border-radius:20px;background:rgba(124,110,247,.18);color:#aaa2ff;font-size:12px}@media(max-width:700px){.sign-grid{grid-template-columns:1fr}}</style></head><body><div class="gradient-bg"></div><button class="hamburger" id="hamburgerBtn" type="button" aria-label="Open menu"><span></span><span></span><span></span></button><div class="sidebar-backdrop" id="sidebarBackdrop"></div><div class="grid-pattern"></div><aside class="sidebar" id="sidebar"><div class="sidebar-brand"><img src="favicon.png" width="36"><div class="brand-text"><span class="brand-name">ICSS Contracts</span><span class="brand-plan">PARTNER MANAGEMENT</span></div></div><nav class="sidebar-nav" id="nav"><a href="index.html" class="nav-item owner-only"><span class="nav-icon">⬛</span> Dashboard</a><a href="tenants.html" class="nav-item owner-only"><span class="nav-icon">🏢</span> Tenants</a><a href="contracts.html" class="nav-item active"><span class="nav-icon">✍️</span> Partner Contracts</a></nav><div class="sidebar-footer"><div class="user-info"><div class="user-avatar" id="userAvatar">?</div><div><div class="user-name" id="userName">—</div><div class="user-role" id="userRole">—</div></div></div><button class="logout-btn" type="button">Sign Out</button></div></aside><main class="main-content"><header class="page-header"><div><h1 class="page-title">Partner Contracts</h1><p class="page-subtitle">Invite partners, countersign agreements, and download permanent copies</p></div></header>
<section class="plan-card owner-only" id="invite"><h2 class="section-title">Create one-time signing link</h2><div class="sign-grid"><div class="form-group"><label>Partner name (optional)</label><input id="inviteName"></div><div class="form-group"><label>Partner email</label><input id="inviteEmail" type="email"></div></div><button class="btn btn-primary" id="invitePartnerBtn" type="button" style="margin-top:14px">Email invitation</button><p id="inviteResult" class="contract-meta"></p></section><section id="agreements" style="margin-top:24px"><div class="spinner"></div></section></main><script src="js/admin.js"></script><script>
const user=getUser();requireAuth();populateUserUI();if(user?.role==='platform_partner')document.querySelectorAll('.owner-only').forEach(e=>e.remove());
async function invitePartner(){const out=document.getElementById('inviteResult');try{const d=await apiFetch('/api/v1/partners/invitations',{method:'POST',body:{name:inviteName.value,email:inviteEmail.value}});out.innerHTML='Invitation emailed. One-time link: <a href="'+d.signingLink+'" target="_blank">open link</a>';load()}catch(e){out.textContent=e.message}}
function esc(v){const d=document.createElement('div');d.textContent=v||'—';return d.innerHTML}
async function downloadAgreement(id){const r=await fetch('/api/v1/partners/'+id+'/download',{headers:{Authorization:'Bearer '+getToken()}});if(!r.ok){const d=await r.json();return alert(d.error)}const blob=await r.blob(),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ICSS_Partner_Agreement_'+id+'.pdf';a.click();URL.revokeObjectURL(a.href)}
async function ownerSign(id){const keys=['effectiveDate','signature','printedName','title','witnessName','witnessSignature'],body={};keys.forEach(k=>body[k]=document.getElementById(k+'-'+id).value);if(!confirm('Complete this agreement and create the partner admin credentials?'))return;try{const d=await apiFetch('/api/v1/partners/'+id+'/owner-sign',{method:'POST',body});alert(d.message);load()}catch(e){alert(e.message)}}
async function load(){try{const d=await apiFetch('/api/v1/partners');agreements.innerHTML=d.agreements.length?'':'<div class="empty-state">No partner agreements yet.</div>';d.agreements.forEach(a=>{const card=document.createElement('article');card.className='contract-card';card.innerHTML=`<div style="display:flex;justify-content:space-between;gap:10px"><div><h3>${esc(a.partner_name||a.partner_email)}</h3><div class="contract-meta">${esc(a.partner_email)}<br>Partner signed: ${a.partner_signed_at?new Date(a.partner_signed_at).toLocaleString():'Pending'}<br>Owner signed: ${a.owner_signed_at?new Date(a.owner_signed_at).toLocaleString():'Pending'}</div></div><span class="badge">${esc(a.status.replaceAll('_',' '))}</span></div><button class="btn btn-secondary btn-sm" type="button" style="margin-top:15px" data-agreement-action="download" data-agreement-id="${a.id}">Download contract</button>${user?.role==='platform_owner'&&a.status==='partner_signed'?`<div class="sign-grid"><input type="date" id="effectiveDate-${a.id}" aria-label="Effective date"><input id="signature-${a.id}" placeholder="Owner signature (typed full name)"><input id="printedName-${a.id}" value="Shamar Baker" placeholder="Owner printed name"><input id="title-${a.id}" placeholder="Owner title / capacity"><input id="witnessName-${a.id}" placeholder="Owner witness printed name"><input id="witnessSignature-${a.id}" placeholder="Owner witness signature"></div><button class="btn btn-primary" type="button" style="margin-top:12px" data-agreement-action="sign" data-agreement-id="${a.id}">Countersign and create credentials</button>`:''}`;agreements.appendChild(card)})}catch(e){agreements.innerHTML='<div class="empty-state">'+esc(e.message)+'</div>'}}document.getElementById('invitePartnerBtn')?.addEventListener('click',invitePartner);agreements.addEventListener('click',event=>{const button=event.target.closest('[data-agreement-action]');if(!button)return;if(button.dataset.agreementAction==='download')downloadAgreement(button.dataset.agreementId);if(button.dataset.agreementAction==='sign')ownerSign(button.dataset.agreementId)});load();
</script></body></html>
