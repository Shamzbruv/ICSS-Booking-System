<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICSS Admin — Services</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global-theme.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="gradient-bg"></div>
<div class="grid-pattern"></div>

<!-- Mobile hamburger -->
<button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
    <span></span><span></span><span></span>
</button>

<!-- Backdrop for mobile sidebar -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="./favicon.png" alt="ICSS Icon" style="width: 36px; height: 36px; border-radius: 8px; object-fit: contain;">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <span style="font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 1.2rem; background: linear-gradient(135deg, #ffffff, #a5b4fc); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1;">ICSS</span>
                <span style="font-size: 0.45rem; letter-spacing: 1px; color: #8888aa; font-weight: 600; line-height: 1; margin-top: 2px;">BOOKING MANAGEMENT</span>
            </div>
        </div>
        <div class="brand-text">
            <span class="brand-name" id="tenantName">Booking System</span>
            <span class="brand-plan" id="tenantPlan"></span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">⬛</span> Dashboard</a>
        <a href="bookings.html" class="nav-item"><span class="nav-icon">📅</span> Bookings</a>
        <a href="availability.html" class="nav-item"><span class="nav-icon">🗓️</span> Availability</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
        <a href="services.html" class="nav-item active"><span class="nav-icon">📦</span> Services</a>
    </nav>
</aside>

<main class="main-content">
    <header class="page-header">
        <div>
            <h1 class="page-title">Services</h1>
            <p class="page-subtitle">Manage your services, duration, and payment overrides.</p>
        </div>
        <button class="btn btn-primary" id="addServiceBtn">+ Add Service</button>
    </header>

    <div class="card" style="padding: 1.5rem; overflow-x: auto;">
        <table class="data-table" id="servicesTable" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 2px solid var(--border); text-align: left;">
                    <th style="padding: 0.75rem 1rem;">Service Name</th>
                    <th style="padding: 0.75rem 1rem;">Duration</th>
                    <th style="padding: 0.75rem 1rem;">Price</th>
                    <th style="padding: 0.75rem 1rem;">Payment Mode</th>
                    <th style="padding: 0.75rem 1rem;">Deposit Rule</th>
                    <th style="padding: 0.75rem 1rem;">Actions</th>
                </tr>
            </thead>
            <tbody id="servicesList">
                <tr><td colspan="6" style="padding: 1rem; text-align: center;">Loading services...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<!-- Create/Edit Modal -->
<div id="serviceModal" class="modal-overlay">
    <div class="modal">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <h2 id="modalTitle" style="font-size: 1.2rem; font-weight: 700;">Add Service</h2>
            <button id="modalCloseBtn" style="background:none;border:none;color:var(--text-dim);font-size:24px;line-height:1;cursor:pointer;">✕</button>
        </div>
        <form id="serviceForm">
            <input type="hidden" id="serviceId">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="svc_name" class="form-control" required placeholder="e.g. Soft Glam Makeup">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" id="svc_price" class="form-control" required placeholder="0" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <div style="display:flex;gap:8px;">
                        <select id="svc_duration_h" class="form-control" style="flex:1;">
                            <option value="0">0 hr</option>
                            <option value="60">1 hr</option>
                            <option value="120">2 hrs</option>
                            <option value="180">3 hrs</option>
                            <option value="240">4 hrs</option>
                            <option value="300">5 hrs</option>
                            <option value="360">6 hrs</option>
                            <option value="420">7 hrs</option>
                            <option value="480">8 hrs</option>
                        </select>
                        <select id="svc_duration_m" class="form-control" style="flex:1;">
                            <option value="0">0 min</option>
                            <option value="15">15 min</option>
                            <option value="30">30 min</option>
                            <option value="45">45 min</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Buffer Time (mins)</label>
                    <input type="number" id="svc_buffer" class="form-control" value="0" min="0">
                </div>

                <div class="form-group">
                    <label>Payment Mode Override</label>
                    <select id="svc_payment_mode" class="form-control">
                        <option value="tenant_default">Use Business Default</option>
                        <option value="none">No Payment</option>
                        <option value="wipay">WiPay</option>
                        <option value="manual">Manual Bank Transfer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Requirement Type</label>
                    <select id="svc_payment_req" class="form-control">
                        <option value="none">None</option>
                        <option value="deposit">Deposit</option>
                        <option value="full">Full Payment</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Deposit Type</label>
                    <select id="svc_deposit_type" class="form-control">
                        <option value="percentage">Percentage (%)</option>
                        <option value="fixed">Fixed Amount</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deposit Amount</label>
                    <input type="number" id="svc_deposit_amount" class="form-control" value="0" min="0" step="0.01">
                </div>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
                <label>Description</label>
                <textarea id="svc_description" class="form-control" rows="3" placeholder="Short description of this service..."></textarea>
            </div>

            <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 0.75rem;">
                <button type="button" class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Service</button>
            </div>
        </form>
    </div>
</div>

<script src="js/admin.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        requireAuth();
        setupMobileNav();
        await loadServices();

        document.getElementById('addServiceBtn').addEventListener('click', showCreateModal);
        document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
        document.getElementById('modalCancelBtn').addEventListener('click', closeModal);

        // Close when clicking outside modal content
        document.getElementById('serviceModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('serviceModal')) closeModal();
        });

        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await saveService();
        });
    });

    function setupMobileNav() {
        const hamburger = document.getElementById('hamburgerBtn');
        const sidebar   = document.getElementById('sidebar');
        const backdrop  = document.getElementById('sidebarBackdrop');
        if (!hamburger) return;

        hamburger.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            backdrop.classList.toggle('show');
        });
        backdrop.addEventListener('click', () => {
            sidebar.classList.remove('open');
            backdrop.classList.remove('show');
        });
    }

    function closeModal() {
        document.getElementById('serviceModal').classList.remove('open');
    }

    async function loadServices() {
        try {
            const data = await apiFetch('/api/v1/services');
            const tbody = document.getElementById('servicesList');
            tbody.innerHTML = '';

            if (!data.services || data.services.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="padding: 2rem; text-align: center; color: var(--text-dim);">No services yet. Click <strong>+ Add Service</strong> to get started.</td></tr>`;
                return;
            }

            data.services.forEach(svc => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Service" style="padding: 1rem;"><strong>${escHtml(svc.name)}</strong>${svc.description ? `<div style="font-size:12px;color:var(--text-dim);margin-top:2px;">${escHtml(svc.description.substring(0,60))}${svc.description.length>60?'…':''}</div>` : ''}</td>
                    <td data-label="Duration" style="padding: 1rem;">${svc.duration_minutes}m${svc.buffer_time_minutes > 0 ? ` + ${svc.buffer_time_minutes}m buffer` : ''}</td>
                    <td data-label="Price" style="padding: 1rem;">${escHtml(svc.currency || 'JMD')} ${Number(svc.price).toLocaleString()}</td>
                    <td data-label="Payment" style="padding: 1rem;"><span style="background:var(--gold-glow);color:var(--gold);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">${escHtml(svc.payment_mode || 'default')}</span></td>
                    <td data-label="Deposit" style="padding: 1rem;">${svc.payment_requirement_type !== 'none' ? `${escHtml(svc.payment_requirement_type)} ${svc.deposit_amount > 0 ? '(' + svc.deposit_amount + ')' : ''}` : '—'}</td>
                    <td style="padding: 1rem;">
                        <button class="btn btn-secondary btn-sm" onclick="editService('${svc.id}')">✏️ Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteService('${svc.id}')" style="margin-left:6px;">🗑️ Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error('Failed to load services:', err);
            document.getElementById('servicesList').innerHTML = `<tr><td colspan="6" style="padding:1rem;text-align:center;color:var(--danger);">Failed to load services: ${escHtml(err.message)}</td></tr>`;
        }
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showCreateModal() {
        document.getElementById('serviceForm').reset();
        document.getElementById('serviceId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Service';
        document.getElementById('svc_duration_h').value = '60'; // default 1hr
        document.getElementById('svc_duration_m').value = '0';
        document.getElementById('svc_buffer').value = 0;
        document.getElementById('svc_deposit_amount').value = 0;
        document.getElementById('serviceModal').classList.add('open');
    }

    async function editService(id) {
        try {
            const res = await apiFetch(`/api/v1/services`);
            const service = res.services.find(s => s.id === id);
            if (!service) return alert('Service not found.');

            document.getElementById('serviceId').value              = service.id;
            document.getElementById('svc_name').value               = service.name || '';
            document.getElementById('svc_price').value              = service.price || 0;
            // Decompose total minutes into hrs + mins dropdowns
            const totalMins = service.duration_minutes || 60;
            const dHrs = Math.floor(totalMins / 60) * 60;
            const dMin = totalMins % 60;
            // Snap minutes to nearest 15
            const snappedMin = [0,15,30,45].reduce((a,b) => Math.abs(b-dMin)<Math.abs(a-dMin)?b:a, 0);
            document.getElementById('svc_duration_h').value = String(dHrs);
            document.getElementById('svc_duration_m').value = String(snappedMin);
            document.getElementById('svc_buffer').value             = service.buffer_time_minutes || 0;
            document.getElementById('svc_payment_mode').value       = service.payment_mode || 'tenant_default';
            document.getElementById('svc_payment_req').value        = service.payment_requirement_type || 'none';
            document.getElementById('svc_deposit_type').value       = service.deposit_type || 'percentage';
            document.getElementById('svc_deposit_amount').value     = service.deposit_amount || 0;
            document.getElementById('svc_description').value        = service.description || '';

            document.getElementById('modalTitle').textContent = 'Edit Service';
            document.getElementById('serviceModal').classList.add('open');
        } catch (err) {
            alert('Error loading service: ' + err.message);
        }
    }

    async function deleteService(id) {
        if (!confirm('Are you sure you want to delete this service?')) return;
        try {
            await apiFetch(`/api/v1/services/${id}`, { method: 'DELETE' });
            await loadServices();
        } catch (err) {
            alert('Failed to delete: ' + err.message);
        }
    }

    async function saveService() {
        const id = document.getElementById('serviceId').value;
        const payload = {
            name:                     document.getElementById('svc_name').value.trim(),
            price:                    parseFloat(document.getElementById('svc_price').value) || 0,
            duration_minutes:         (parseInt(document.getElementById('svc_duration_h').value)||0) + (parseInt(document.getElementById('svc_duration_m').value)||0),
            buffer_time_minutes:      parseInt(document.getElementById('svc_buffer').value) || 0,
            payment_mode:             document.getElementById('svc_payment_mode').value,
            payment_requirement_type: document.getElementById('svc_payment_req').value,
            deposit_type:             document.getElementById('svc_deposit_type').value,
            deposit_amount:           parseFloat(document.getElementById('svc_deposit_amount').value) || 0,
            description:              document.getElementById('svc_description').value.trim() || null,
        };

        const submitBtn = document.querySelector('#serviceForm button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving…';

        try {
            if (id) {
                await apiFetch(`/api/v1/services/${id}`, { method: 'PATCH', body: payload });
            } else {
                await apiFetch(`/api/v1/services`, { method: 'POST', body: payload });
            }
            closeModal();
            await loadServices();
        } catch (err) {
            alert('Error saving service: ' + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Service';
        }
    }
</script>
</body>
</html>
