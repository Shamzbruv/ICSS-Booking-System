name: ICSS Booking System CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint, audit, and test ────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: icss_test
          POSTGRES_USER: icss
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high

      - name: License check
        run: npx license-checker --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;Unlicense;0BSD" 2>/dev/null || echo "License check skipped (tool not installed)"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://icss:test_pass@localhost:5432/icss_test
          JWT_SECRET: ci_test_secret
          NODE_ENV: test
        run: npm test

  # ── Job 2: Build & push Docker image to GHCR ────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    # Explicit permissions required — without packages:write the default
    # GITHUB_TOKEN cannot create or push to GitHub Container Registry.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires the image reference to be fully lowercase.
      # github.repository_owner preserves the original case (e.g. "Shamzbruv"),
      # so we normalise it with tr before constructing the tag.
      - name: Compute lowercase image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER}/icss-booking-system" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 3: Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    # To enable the protected environment gate:
    #   1. Go to GitHub → Settings → Environments → New environment → "production"
    #   2. Add RAILWAY_TOKEN as an environment secret
    #   3. Uncomment the line below
    # environment: production

    steps:
      - name: Deploy via Railway
        run: |
          echo "✅ Docker image pushed to GHCR."
          echo "   To enable auto-deploy to Railway:"
          echo "   1. Create a 'production' environment in GitHub Settings → Environments"
          echo "   2. Add RAILWAY_TOKEN as a secret there"
          echo "   3. Uncomment 'environment: production' in ci.yml"
          echo "   4. Uncomment the railway CLI command below"
          # Uncomment once Railway is configured:
          # npm install -g @railway/cli
          # railway up --service icss-booking-system
