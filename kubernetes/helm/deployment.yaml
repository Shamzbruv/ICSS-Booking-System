apiVersion: apps/v1
kind: Deployment
metadata:
  name: icss-booking-api
  labels:
    app: icss-booking-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: icss-booking-api
  template:
    metadata:
      labels:
        app: icss-booking-api
    spec:
      containers:
      - name: api
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: icss-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: icss-db-secrets
              key: database-url
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: icss-booking-service
spec:
  selector:
    app: icss-booking-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
